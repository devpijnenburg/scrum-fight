name: OTAP Pipeline

on:
  push:
    branches: ["**"]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.sha.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute SHA tag
        id: sha
        run: echo "tag=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Docker meta (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/scrum-fight-backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Docker meta (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/scrum-fight-frontend
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-test:
    name: Deploy to Test
    runs-on: [self-hosted, proxmox]
    needs: build
    environment: test

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 622 murderbot.nl >> ~/.ssh/known_hosts || true

      - name: Copy test compose file to VM
        run: |
          scp -P 622 -i ~/.ssh/deploy_key \
            docker-compose.test.yml \
            ${{ secrets.DEPLOY_USER }}@murderbot.nl:~/scrum-fight/

      - name: Bootstrap .env.test if missing
        run: |
          ssh -p 622 -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@murderbot.nl << 'EOF'
          if [ ! -f ~/scrum-fight/.env.test ]; then
            cp ~/scrum-fight/.env ~/scrum-fight/.env.test
            sed -i 's/^POSTGRES_DB=.*/POSTGRES_DB=scrumfight_test/' ~/scrum-fight/.env.test
            grep -q '^FRONTEND_TEST_PORT=' ~/scrum-fight/.env.test \
              || echo 'FRONTEND_TEST_PORT=8081' >> ~/scrum-fight/.env.test
            echo "Created .env.test from .env with test overrides"
          else
            echo ".env.test already exists, skipping bootstrap"
          fi
          EOF

      - name: Deploy test on VM
        run: |
          ssh -p 622 -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@murderbot.nl << 'EOF'
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}" docker compose \
            -p scrum-fight-test \
            -f ~/scrum-fight/docker-compose.test.yml \
            --env-file ~/scrum-fight/.env.test \
            pull
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}" docker compose \
            -p scrum-fight-test \
            -f ~/scrum-fight/docker-compose.test.yml \
            --env-file ~/scrum-fight/.env.test \
            up -d --remove-orphans
          docker image prune -f
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}" docker compose \
            -p scrum-fight-test \
            -f ~/scrum-fight/docker-compose.test.yml \
            --env-file ~/scrum-fight/.env.test \
            ps
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  deploy-production:
    name: Deploy to Production
    runs-on: [self-hosted, proxmox]
    needs: [build, deploy-test]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 622 murderbot.nl >> ~/.ssh/known_hosts || true

      - name: Copy compose file to VM
        run: |
          scp -P 622 -i ~/.ssh/deploy_key \
            docker-compose.prod.yml \
            ${{ secrets.DEPLOY_USER }}@murderbot.nl:~/scrum-fight/

      - name: Deploy production on VM
        run: |
          ssh -p 622 -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@murderbot.nl << 'EOF'
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker compose \
            -f ~/scrum-fight/docker-compose.prod.yml \
            --env-file ~/scrum-fight/.env \
            pull
          docker compose \
            -f ~/scrum-fight/docker-compose.prod.yml \
            --env-file ~/scrum-fight/.env \
            up -d --remove-orphans
          docker image prune -f
          docker compose \
            -f ~/scrum-fight/docker-compose.prod.yml \
            --env-file ~/scrum-fight/.env \
            ps
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
