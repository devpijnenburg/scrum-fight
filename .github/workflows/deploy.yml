name: Deploy to production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/scrum-fight-backend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/scrum-fight-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/scrum-fight-frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/scrum-fight-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM
    runs-on: [self-hosted, proxmox]   # Proxmox runner heeft thuis-IP → bereikt murderbot.nl
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 622 murderbot.nl >> ~/.ssh/known_hosts || true

      - name: Copy compose file to VM
        run: |
          scp -P 622 -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key \
            docker-compose.prod.yml \
            ${{ secrets.DEPLOY_USER }}@murderbot.nl:~/scrum-fight/

      - name: Deploy on VM
        run: |
          ssh -p 622 -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@murderbot.nl << 'EOF'
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker compose \
            -f ~/scrum-fight/docker-compose.prod.yml \
            --env-file ~/scrum-fight/.env \
            pull
          docker compose \
            -f ~/scrum-fight/docker-compose.prod.yml \
            --env-file ~/scrum-fight/.env \
            up -d --remove-orphans
          docker image prune -f
          docker compose \
            -f ~/scrum-fight/docker-compose.prod.yml \
            --env-file ~/scrum-fight/.env \
            ps
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
