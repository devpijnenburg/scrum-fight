name: Deploy to production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/scrum-fight-backend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/scrum-fight-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/scrum-fight-frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/scrum-fight-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM
    runs-on: [self-hosted, linux]
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull and restart containers
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          docker compose \
            -f docker-compose.prod.yml \
            --env-file /opt/scrum-fight/.env \
            pull
          docker compose \
            -f docker-compose.prod.yml \
            --env-file /opt/scrum-fight/.env \
            up -d --remove-orphans
          docker image prune -f
          docker compose \
            -f docker-compose.prod.yml \
            --env-file /opt/scrum-fight/.env \
            ps
