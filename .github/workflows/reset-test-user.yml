name: Reset test user data

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'E-mailadres van de gebruiker om te resetten'
        required: true
        default: 'scrumfight@pijnenburg.pro'
      environment:
        description: 'Omgeving'
        required: true
        default: 'test'
        type: choice
        options: [test, production]

jobs:
  reset-user:
    runs-on: [self-hosted, proxmox]
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 622 murderbot.nl >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Reset user data via psql
        run: |
          ENV_FILE=".env${{ inputs.environment == 'test' && '.test' || '' }}"
          COMPOSE_FILE="docker-compose${{ inputs.environment == 'test' && '.test' || '.prod' }}.yml"
          PROJECT="scrum-fight${{ inputs.environment == 'test' && '-test' || '' }}"
          DB_NAME="${{ inputs.environment == 'test' && 'scrumfight_test' || '' }}"

          ssh -p 622 -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@murderbot.nl << EOF
          source ~/scrum-fight/${ENV_FILE}
          RESOLVED_DB="${DB_NAME:-\$POSTGRES_DB}"

          RESULT=\$(docker compose -p "${PROJECT}" -f ~/scrum-fight/${COMPOSE_FILE} \
            exec -T db psql -U \$POSTGRES_USER -d \$RESOLVED_DB -t -c \
            "SELECT id FROM users WHERE email = '${{ inputs.email }}';")
          USER_ID=\$(echo "\$RESULT" | tr -d '[:space:]')

          if [ -z "\$USER_ID" ]; then
            echo "FOUT: gebruiker '${{ inputs.email }}' niet gevonden."
            exit 1
          fi

          echo "Gebruiker gevonden: \$USER_ID"

          psql_run() {
            docker compose -p "${PROJECT}" -f ~/scrum-fight/${COMPOSE_FILE} \
              exec -T db psql -U \$POSTGRES_USER -d \$RESOLVED_DB -c "\$1"
          }
          psql_opt() {
            psql_run "\$1" 2>/dev/null || echo "  (tabel bestaat nog niet)"
          }
          show_stats() {
            psql_run "SELECT
                COUNT(*)                                         AS stemmen,
                COUNT(DISTINCT room_id)                         AS spellen,
                COUNT(*) FILTER (WHERE value = '☕')            AS koffies,
                COUNT(*) FILTER (WHERE value NOT IN ('?','☕')) AS schattingen
              FROM user_votes WHERE user_id = '\$USER_ID';"
            psql_opt "SELECT COUNT(*) AS badges            FROM user_badges             WHERE user_id = '\$USER_ID';"
            psql_opt "SELECT COUNT(*) AS spectator_sessies FROM user_spectator_sessions WHERE user_id = '\$USER_ID';"
            psql_opt "SELECT COUNT(*) AS reacties          FROM user_reactions          WHERE user_id = '\$USER_ID';"
          }

          echo ""
          echo "=== Data voor reset ==="
          show_stats

          echo ""
          echo "=== Reset uitvoeren ==="
          psql_run "DELETE FROM user_votes               WHERE user_id = '\$USER_ID';"
          psql_opt "DELETE FROM user_badges              WHERE user_id = '\$USER_ID';"
          psql_opt "DELETE FROM user_spectator_sessions  WHERE user_id = '\$USER_ID';"
          psql_opt "DELETE FROM user_reactions           WHERE user_id = '\$USER_ID';"

          echo ""
          echo "=== Verificatie na reset ==="
          show_stats

          echo ""
          echo "Reset voltooid voor '${{ inputs.email }}'."
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
