services:
  db:
    image: postgres:16-alpine
    container_name: scrum-fight-test-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/${GHCR_OWNER}/scrum-fight-backend:${IMAGE_TAG}
    container_name: scrum-fight-test-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      BASE_URL: ${BASE_URL}
      CREEM_API_HOST: ${CREEM_API_HOST:-test-api.creem.io}
      CREEM_API_KEY: ${CREEM_API_KEY}
      CREEM_WEBHOOK_SECRET: ${CREEM_WEBHOOK_SECRET}
      CREEM_PRO_MONTHLY_PRODUCT_ID: ${CREEM_PRO_MONTHLY_PRODUCT_ID}
      CREEM_PRO_YEARLY_PRODUCT_ID: ${CREEM_PRO_YEARLY_PRODUCT_ID}
      CREEM_PREMIUM_MONTHLY_PRODUCT_ID: ${CREEM_PREMIUM_MONTHLY_PRODUCT_ID}
      CREEM_PREMIUM_YEARLY_PRODUCT_ID: ${CREEM_PREMIUM_YEARLY_PRODUCT_ID}

  frontend:
    image: ghcr.io/${GHCR_OWNER}/scrum-fight-frontend:${IMAGE_TAG}
    container_name: scrum-fight-test-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_TEST_PORT:-8082}:80"

volumes:
  postgres_test_data:
