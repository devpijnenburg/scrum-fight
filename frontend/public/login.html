<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen — Planning Poker 🃏</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="page-auth">

  <nav class="navbar">
    <a href="/" class="navbar-brand">🃏 Planning Poker</a>
  </nav>

  <main class="auth-main">
    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Inloggen</button>
        <button class="auth-tab" data-tab="register">Registreren</button>
      </div>

      <!-- Login form -->
      <form id="loginForm" class="auth-form" autocomplete="on">
        <div class="form-group">
          <label for="loginEmail">E-mailadres</label>
          <input id="loginEmail" type="email" class="input" placeholder="naam@email.nl" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Wachtwoord</label>
          <input id="loginPassword" type="password" class="input" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Inloggen →</button>
        <p id="loginError" class="form-error hidden"></p>
      </form>

      <!-- Register form -->
      <form id="registerForm" class="auth-form hidden" autocomplete="on">
        <div class="form-group">
          <label for="regName">Naam</label>
          <input id="regName" type="text" class="input" placeholder="Jouw naam" maxlength="50" required />
        </div>
        <div class="form-group">
          <label for="regEmail">E-mailadres</label>
          <input id="regEmail" type="email" class="input" placeholder="naam@email.nl" required />
        </div>
        <div class="form-group">
          <label for="regPassword">Wachtwoord <small>(min. 8 tekens)</small></label>
          <input id="regPassword" type="password" class="input" placeholder="••••••••" minlength="8" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Account aanmaken →</button>
        <p id="registerError" class="form-error hidden"></p>
      </form>

      <!-- OAuth divider -->
      <div class="oauth-divider"><span>of ga verder met</span></div>

      <div class="oauth-buttons">
        <a href="/api/auth/google" class="btn btn-oauth">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
          Google
        </a>
        <a href="/api/auth/github" class="btn btn-oauth">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>
      </div>

    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Tab switching
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
        document.getElementById(tab.dataset.tab === 'login' ? 'loginForm' : 'registerForm').classList.remove('hidden');
      });
    });
    // Activate register tab from hash
    if (location.hash === '#register') {
      document.querySelector('[data-tab="register"]').click();
    }

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('loginError');
      err.classList.add('hidden');
      try {
        const { user, token } = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value,
          }),
        });
        localStorage.setItem('token', token);
        localStorage.setItem('userName', user.name);
        window.location.href = '/dashboard.html';
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.remove('hidden');
      }
    });

    // Register
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('registerError');
      err.classList.add('hidden');
      try {
        const { user, token } = await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({
            name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPassword').value,
          }),
        });
        localStorage.setItem('token', token);
        localStorage.setItem('userName', user.name);
        window.location.href = '/dashboard.html';
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
