<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen — Scrum Fight</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/styles.css?v=233ab3d" />
</head>
<body class="page-auth">

  <site-nav></site-nav>

  <main class="auth-main">
    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" data-i18n="login.tab.login">Inloggen</button>
        <button class="auth-tab" data-tab="register" data-i18n="login.tab.register">Registreren</button>
      </div>

      <!-- Login form -->
      <form id="loginForm" class="auth-form" autocomplete="on">
        <div class="form-group">
          <label for="loginEmail" data-i18n="login.email">E-mailadres</label>
          <input id="loginEmail" type="email" class="input" data-i18n-ph="login.email.ph" placeholder="naam@email.nl" required />
        </div>
        <div class="form-group">
          <label for="loginPassword" data-i18n="login.password">Wachtwoord</label>
          <input id="loginPassword" type="password" class="input" data-i18n-ph="login.password.ph" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" data-i18n="login.btn">Inloggen →</button>
        <p id="loginError" class="form-error hidden"></p>
      </form>

      <!-- Register form -->
      <form id="registerForm" class="auth-form hidden" autocomplete="on">
        <div class="form-group">
          <label for="regName" data-i18n="login.register.name">Naam</label>
          <input id="regName" type="text" class="input" data-i18n-ph="login.register.name.ph" placeholder="Jouw naam" maxlength="50" required />
        </div>
        <div class="form-group">
          <label for="regEmail" data-i18n="login.email">E-mailadres</label>
          <input id="regEmail" type="email" class="input" data-i18n-ph="login.email.ph" placeholder="naam@email.nl" required />
        </div>
        <div class="form-group">
          <label for="regPassword">
            <span data-i18n="login.password">Wachtwoord</span> <small data-i18n="login.password.hint">(min. 8 tekens)</small>
          </label>
          <input id="regPassword" type="password" class="input" data-i18n-ph="login.password.ph" placeholder="••••••••" minlength="8" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" data-i18n="login.register.btn">Account aanmaken →</button>
        <p id="registerError" class="form-error hidden"></p>
      </form>

      <!-- TOTP step (hidden by default) -->
      <div id="totpStep" class="hidden">
        <p class="totp-step-hint">Voer de 6-cijferige code in van je authenticator-app.</p>
        <div class="form-group">
          <label for="totpCode">Verificatiecode</label>
          <input id="totpCode" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6"
                 class="input input-code" placeholder="000000" autocomplete="one-time-code" />
        </div>
        <button id="totpSubmitBtn" class="btn btn-primary btn-full" style="margin-top:.8rem">Verifiëren →</button>
        <p id="totpError" class="form-error hidden"></p>
        <button id="totpBackBtn" class="btn btn-ghost btn-full" style="margin-top:.5rem">← Terug</button>
      </div>

      <!-- OAuth divider -->
      <div class="oauth-divider"><span data-i18n="login.oauth.divider">of ga verder met</span></div>

      <div class="oauth-buttons">
        <a href="/api/auth/google" class="btn btn-oauth" data-oauth-provider="google">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
          Google
        </a>
        <a href="/api/auth/github" class="btn btn-oauth" data-oauth-provider="github">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <div class="lang-switcher"></div>
        <span class="footer-copy" data-i18n="footer.copy">© 2025 Scrum Fight</span>
      </div>
      <nav class="footer-links">
        <a href="/privacy.html" data-i18n="footer.privacy">Privacybeleid</a>
        <a href="/terms.html" data-i18n="footer.terms">Algemene voorwaarden</a>
      </nav>
    </div>
  </footer>

  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script>
    initOAuthButtons();

    // Tab switching
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
        document.getElementById(tab.dataset.tab === 'login' ? 'loginForm' : 'registerForm').classList.remove('hidden');
      });
    });
    if (location.hash === '#register') {
      document.querySelector('[data-tab="register"]').click();
    }

    let _preAuthToken = null;

    function showTotpStep(preAuthToken) {
      _preAuthToken = preAuthToken;
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerForm').classList.add('hidden');
      document.querySelector('.auth-tabs').classList.add('hidden');
      document.querySelector('.oauth-divider').classList.add('hidden');
      document.querySelector('.oauth-buttons').classList.add('hidden');
      document.getElementById('totpStep').classList.remove('hidden');
      document.getElementById('totpCode').focus();
    }

    document.getElementById('totpBackBtn').addEventListener('click', () => {
      _preAuthToken = null;
      document.getElementById('totpStep').classList.add('hidden');
      document.getElementById('totpError').classList.add('hidden');
      document.querySelector('.auth-tabs').classList.remove('hidden');
      document.querySelector('.oauth-divider').classList.remove('hidden');
      document.querySelector('.oauth-buttons').classList.remove('hidden');
      document.getElementById('loginForm').classList.remove('hidden');
    });

    document.getElementById('totpSubmitBtn').addEventListener('click', async () => {
      const err = document.getElementById('totpError');
      err.classList.add('hidden');
      const code = document.getElementById('totpCode').value.trim();
      try {
        const { token } = await apiFetch('/auth/verify-totp', {
          method: 'POST',
          body: JSON.stringify({ preAuthToken: _preAuthToken, code }),
        });
        localStorage.setItem('token', token);
        window.location.href = '/dashboard.html';
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.remove('hidden');
      }
    });

    document.getElementById('totpCode').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('totpSubmitBtn').click();
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('loginError');
      err.classList.add('hidden');
      try {
        const result = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value,
          }),
        });
        if (result.requiresTotp) {
          showTotpStep(result.preAuthToken);
        } else {
          localStorage.setItem('token', result.token);
          localStorage.setItem('userName', result.user.name);
          window.location.href = '/dashboard.html';
        }
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.remove('hidden');
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('registerError');
      err.classList.add('hidden');
      try {
        const { user, token } = await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({
            name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPassword').value,
          }),
        });
        localStorage.setItem('token', token);
        localStorage.setItem('userName', user.name);
        window.location.href = '/dashboard.html';
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
